version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: paytray-postgres
    environment:
      POSTGRES_DB: paytray_development
      POSTGRES_USER: paytray
      POSTGRES_PASSWORD: paytray_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paytray"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: paytray-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://paytray:paytray_dev_password@postgres:5432/paytray_development
      JWT_SECRET: dev_secret_key_minimum_32_chars_here
      WEB3_SIGNATURE_SALT: dev_web3_salt_minimum_32_chars_here
      LIVEKIT_ENABLED: "false"
      CERAMIC_ENABLED: "false"
      SABLIER_ENABLED: "false"
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: npm run dev

  # Frontend Development Server
  frontend:
    build:
      context: ./packages/react-app
      dockerfile: Dockerfile.dev
    container_name: paytray-frontend
    environment:
      VITE_BACKEND_API_URL: http://localhost:3001
      VITE_LIVEKIT_ENABLED: "false"
      VITE_CERAMIC_ENABLED: "false"
      VITE_SABLIER_ENABLED: "false"
    ports:
      - "3000:5173"
    depends_on:
      - backend
    volumes:
      - ./packages/react-app:/app
      - /app/node_modules
    command: npm run dev

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: paytray-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: paytray-network
